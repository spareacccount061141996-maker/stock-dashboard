name: IPO Mobile Alerts

on:
  schedule:
    - cron: "30 4 * * 1-5"
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

jobs:
  ipo-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install notification dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests==2.34.2 beautifulsoup4==4.15.0

      - name: Restore notification state
        uses: actions/cache/restore@v4
        with:
          path: .notification-state
          key: ipo-alert-state-${{ github.run_id }}
          restore-keys: |
            ipo-alert-state-

      - name: Send IPO alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ipo_notifications.py

      - name: Ensure notification state directory exists
        if: always()
        run: mkdir -p .notification-state

      - name: Save notification state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .notification-state
          key: ipo-alert-state-${{ github.run_id }}
