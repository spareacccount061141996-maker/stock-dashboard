name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Visit dashboard
        shell: bash
        run: |
          APP_URL="https://stock-dashboard-hedlfucmgdfondjkvaiwg7.streamlit.app/"
          HEALTH_URL="${APP_URL}_stcore/health"

          check_url() {
            local url="$1"
            curl \
              --location \
              --silent \
              --show-error \
              --output /tmp/streamlit-health.html \
              --write-out "%{http_code}" \
              --connect-timeout 20 \
              --max-time 60 \
              --header "Cache-Control: no-cache" \
              --user-agent "Mozilla/5.0 GitHubActions StreamlitKeepAlive/2.0" \
              "$url" || true
          }

          for attempt in {1..4}; do
            health_status=$(check_url "$HEALTH_URL")
            app_status=$(check_url "$APP_URL")

            echo "Attempt ${attempt}: health HTTP ${health_status}; app HTTP ${app_status}"

            if [[ "$app_status" =~ ^[23][0-9][0-9]$ ]]; then
              echo "Dashboard responded successfully."
              exit 0
            fi

            sleep 60
          done

          echo "::warning::Dashboard did not return a success response after repeated attempts. This keep-awake run is best-effort and will not fail the workflow."
          exit 0
