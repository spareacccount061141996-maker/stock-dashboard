name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Visit dashboard
        run: |
          curl --fail --location --retry 3 --retry-delay 10 --max-time 60 \
            "https://stock-dashboard-hedlfucmgdfondjkvaiwg7.streamlit.app/"
